name: Deploy editor to GitHub Pages

# Requires Pages to be enabled for the repo (Settings → Pages → GitHub Actions).
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @spine-editor/editor build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/editor/dist
      - id: deployment
        uses: actions/deploy-pages@v4
